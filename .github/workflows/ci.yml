name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-quality:
    name: Backend Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release preflight quality gates
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "ci-very-long-random-placeholder-secret-key-1234567890-abcdef"
          DJANGO_ALLOWED_HOSTS: "example.com"
          DJANGO_CSRF_TRUSTED_ORIGINS: "https://example.com"
          ALLOW_DEMO_ACCOUNT_BOOTSTRAP: "false"
        run: ./scripts/release_preflight.sh

  e2e-smoke:
    name: Browser E2E Smoke
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run browser smoke tests
        env:
          E2E_REQUIRE_BROWSER: "true"
          E2E_HEADLESS: "true"
        run: python manage.py test e2e.smoke_tests
