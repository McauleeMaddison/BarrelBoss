<nav class="mobile-dock" aria-label="Quick navigation">
    {% for link in mobile_dock_links %}
        <a
            class="mobile-dock-link{% if link.active %} active{% endif %}"
            href="{{ link.url }}"
        >
            <span class="mobile-dock-label">{{ link.label }}</span>
            <small class="mobile-dock-meta">{{ link.description }}</small>
        </a>
    {% endfor %}

    {% if mobile_command_links %}
        <button
            type="button"
            class="mobile-dock-link mobile-dock-link-action"
            data-command-toggle
            aria-label="Open more tools"
            aria-controls="mobile-command-sheet"
            aria-expanded="false"
        >
            <span class="mobile-dock-label">{{ mobile_command_button_label }}</span>
            <small class="mobile-dock-meta">{{ mobile_command_button_copy }}</small>
        </button>
    {% endif %}
</nav>
