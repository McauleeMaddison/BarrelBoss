<nav class="mobile-dock" aria-label="Quick navigation">
    <a
        class="mobile-dock-link{% if current == 'dashboard:home' or current == 'dashboard:staff_portal' or current == 'dashboard:management_portal' %} active{% endif %}"
        href="{% url role_home_url_name %}"
        data-dock-icon="HM"
    >
        <span class="mobile-dock-label">Home</span>
    </a>

    <a
        class="mobile-dock-link{% if current == 'stock:list' %} active{% endif %}"
        href="{% url 'stock:list' %}"
        data-dock-icon="ST"
    >
        <span class="mobile-dock-label">Stock</span>
    </a>

    <a
        class="mobile-dock-link{% if current == 'orders:list' or current == 'orders:add' or current == 'orders:edit' %} active{% endif %}"
        href="{% url 'orders:list' %}"
        data-dock-icon="{% if is_management %}OR{% else %}RQ{% endif %}"
    >
        <span class="mobile-dock-label">{% if is_management %}Orders{% else %}Request{% endif %}</span>
    </a>

    {% if is_management %}
        <a
            class="mobile-dock-link{% if current == 'breakages:list' %} active{% endif %}"
            href="{% url 'breakages:list' %}"
            data-dock-icon="BR"
        >
            <span class="mobile-dock-label">Breakages</span>
        </a>
    {% else %}
        <a
            class="mobile-dock-link{% if current == 'checklists:list' %} active{% endif %}"
            href="{% url 'checklists:list' %}"
            data-dock-icon="TK"
        >
            <span class="mobile-dock-label">Tasks</span>
        </a>
    {% endif %}

    <button
        type="button"
        class="mobile-dock-link mobile-dock-button"
        data-nav-toggle
        aria-label="Open menu"
        aria-controls="main-navigation"
        aria-expanded="false"
        data-dock-icon="ME"
    >
        <span class="mobile-dock-label">Menu</span>
    </button>
</nav>
